title: "Sito di esempio — Dev Kit Italia + Jekyll"
short_title: "Dev Kit Italia + Jekyll"
description: "Tema Jekyll minimale con web component Dev Kit Italia"
lang: it

# BSI and DKI versions — auto-updated by scripts/vendor.mjs, do not edit manually
bsi_version: ""
devkit_version: ""

# BSI icons
bsi_sprites: "/assets/vendor/bsi/svg/sprites.svg"

# Pretty permalink for blog posts
defaults:
  - scope:
      type: "posts"
    values:
      permalink: /blog/:year/:month/:day/:title/

# Build
markdown: kramdown
permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - package.json
  - package-lock.json
  - vendor
  - README.md
  - scripts
